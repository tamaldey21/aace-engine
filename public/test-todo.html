<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AACE Workspace Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    
    :root {
      --bg-dark: #090a0f;
      --card-bg: rgba(17, 19, 31, 0.75);
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-secondary: #9ca3af;
      
      --accent-cyan: #06b6d4;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-yellow: #f59e0b;
      
      --font-family: 'Outfit', sans-serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: var(--font-family);
      background: var(--bg-dark);
      background-image: 
        radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.08) 0px, transparent 50%),
        radial-gradient(at 90% 90%, rgba(139, 92, 246, 0.08) 0px, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }
    
    .glass-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 30px;
      width: 100%;
      max-width: 500px;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    
    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
    }
    
    .btn {
      background: linear-gradient(135deg, var(--accent-blue), #1d4ed8);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      font-family: var(--font-family);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }
    
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text-main);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: none;
    }
    
    input, select, textarea {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: white;
      font-family: var(--font-family);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent-blue);
    }
    
    h1, h2, h3 {
      font-weight: 700;
      color: white;
      letter-spacing: -0.02em;
    }
    
    .footer-note {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 24px;
      opacity: 0.7;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .filters {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .filter-btn {
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
      font-weight: 600;
    }
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .todo-item {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s;
    }
    .todo-item:hover {
      border-color: rgba(255, 255, 255, 0.15);
    }
    .todo-item.done .text {
      text-decoration: line-through;
      color: var(--text-secondary);
      opacity: 0.6;
    }
    .todo-item-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cb {
      cursor: pointer;
      width: 16px;
      height: 16px;
      accent-color: var(--accent-blue);
    }
    .btn-del {
      background: transparent;
      border: none;
      color: var(--accent-red);
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .btn-del:hover {
      opacity: 1;
    }
    .stats {
      font-size: 12px;
      margin-top: 16px;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <h2 style="margin-bottom: 8px; display: flex; align-items: center; gap: 8px;"><span style="color: var(--accent-blue);">✓</span> Workspace Task Board</h2>
    <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 20px;">Manage personal & team items with localStorage persistence</p>
    
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="What needs to be done?" onkeydown="if(event.key === 'Enter') addTodo()">
      <button class="btn" onclick="addTodo()">Add</button>
    </div>
    
    <div class="filters">
      <span id="items-left">0 items left</span>
      <div style="display: flex; gap: 8px;">
        <span class="filter-btn active" onclick="setFilter('all', this)">All</span>
        <span class="filter-btn" onclick="setFilter('active', this)">Active</span>
        <span class="filter-btn" onclick="setFilter('completed', this)">Completed</span>
      </div>
    </div>
    
    <div id="todo-list" class="todo-list"></div>
    
    <div class="stats">
      <span>Category: General</span>
      <span style="color: var(--accent-cyan); cursor: pointer;" onclick="clearCompleted()">Clear Completed</span>
    </div>
    
    <p class="footer-note">Compiled autonomously by AACE Frontend Developer Bot</p>
  </div>
  
  <script>
    let todos = JSON.parse(localStorage.getItem('aace_todos')) || [
      { text: "Launch AACE core compiler", done: true },
      { text: "Connect database index mapping", done: false },
      { text: "Implement custom template logic", done: false }
    ];
    let filter = 'all';

    function save() {
      localStorage.setItem('aace_todos', JSON.stringify(todos));
      render();
    }

    function addTodo() {
      const input = document.getElementById('todo-input');
      const val = input.value.trim();
      if (!val) return;
      todos.push({ text: val, done: false });
      input.value = '';
      save();
    }

    function toggleTodo(idx) {
      todos[idx].done = !todos[idx].done;
      save();
    }

    function deleteTodo(idx) {
      todos.splice(idx, 1);
      save();
    }

    function setFilter(type, el) {
      filter = type;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function clearCompleted() {
      todos = todos.filter(t => !t.done);
      save();
    }

    function render() {
      const list = document.getElementById('todo-list');
      list.innerHTML = '';
      
      let leftCount = 0;
      
      todos.forEach((todo, idx) => {
        if (!todo.done) leftCount++;
        
        if (filter === 'active' && todo.done) return;
        if (filter === 'completed' && !todo.done) return;
        
        const div = document.createElement('div');
        div.className = 'todo-item' + (todo.done ? ' done' : '');
        div.innerHTML = `
          <div class="todo-item-left">
            <input type="checkbox" class="cb" ${todo.done ? 'checked' : ''} onchange="toggleTodo(${idx})">
            <span class="text">${todo.text}</span>
          </div>
          <button class="btn-del" onclick="deleteTodo(${idx})">✕</button>
        `;
        list.appendChild(div);
      });
      
      document.getElementById('items-left').innerText = `${leftCount} item${leftCount === 1 ? '' : 's'} left`;
    }

    render();
  </script>
</body>
</html>
