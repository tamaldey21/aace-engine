<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AACE Memory Matrix</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    
    :root {
      --bg-dark: #090a0f;
      --card-bg: rgba(17, 19, 31, 0.75);
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-secondary: #9ca3af;
      
      --accent-cyan: #06b6d4;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-yellow: #f59e0b;
      
      --font-family: 'Outfit', sans-serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: var(--font-family);
      background: var(--bg-dark);
      background-image: 
        radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.08) 0px, transparent 50%),
        radial-gradient(at 90% 90%, rgba(139, 92, 246, 0.08) 0px, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }
    
    .glass-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 30px;
      width: 100%;
      max-width: 500px;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    
    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
    }
    
    .btn {
      background: linear-gradient(135deg, var(--accent-blue), #1d4ed8);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      font-family: var(--font-family);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }
    
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text-main);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: none;
    }
    
    input, select, textarea {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: white;
      font-family: var(--font-family);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent-blue);
    }
    
    h1, h2, h3 {
      font-weight: 700;
      color: white;
      letter-spacing: -0.02em;
    }
    
    .footer-note {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 24px;
      opacity: 0.7;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 20px 0;
    }
    .card {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      height: 70px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      cursor: pointer;
      user-select: none;
      transition: all 0.25s;
    }
    .card.flipped {
      background: rgba(59, 130, 246, 0.15);
      border-color: var(--accent-blue);
      color: white;
    }
    .card.matched {
      background: rgba(16, 185, 129, 0.15);
      border-color: var(--accent-green);
      color: var(--accent-green);
      cursor: default;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 14px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <h2 style="text-align: center; margin-bottom: 16px;">Memory Card Matching</h2>
    <div class="info-row">
      <span>Tries: <strong id="tries">0</strong></span>
      <span>Matched: <strong id="matched-count">0/8</strong></span>
    </div>
    
    <div class="board" id="board"></div>
    
    <div style="text-align: center;">
      <button class="btn" onclick="initGame()">Reset Game</button>
    </div>
    
    <p class="footer-note">Compiled autonomously by AACE Frontend Developer Bot</p>
  </div>
  
  <script>
    const icons = ['☀️', '🌧️', '⚡', '❄️', '🔥', '💧', '🌈', '⭐'];
    let cards = [];
    let flippedIndices = [];
    let matchedCount = 0;
    let tries = 0;
    let lockBoard = false;

    function initGame() {
      matchedCount = 0;
      tries = 0;
      flippedIndices = [];
      lockBoard = false;
      document.getElementById('tries').innerText = tries;
      document.getElementById('matched-count').innerText = '0/8';
      
      // Duplicate icons and shuffle
      const deck = [...icons, ...icons];
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      
      cards = deck.map(icon => ({ icon, flipped: false, matched: false }));
      render();
    }

    function render() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      
      cards.forEach((card, idx) => {
        const el = document.createElement('div');
        el.className = 'card' + (card.flipped ? ' flipped' : '') + (card.matched ? ' matched' : '');
        el.innerText = (card.flipped || card.matched) ? card.icon : '❓';
        el.onclick = () => flipCard(idx);
        boardEl.appendChild(el);
      });
    }

    function flipCard(idx) {
      if (lockBoard || cards[idx].flipped || cards[idx].matched) return;
      
      cards[idx].flipped = true;
      flippedIndices.push(idx);
      render();
      
      if (flippedIndices.length === 2) {
        tries++;
        document.getElementById('tries').innerText = tries;
        checkMatch();
      }
    }

    function checkMatch() {
      const [first, second] = flippedIndices;
      if (cards[first].icon === cards[second].icon) {
        cards[first].matched = true;
        cards[second].matched = true;
        matchedCount++;
        document.getElementById('matched-count').innerText = matchedCount + '/8';
        flippedIndices = [];
        render();
      } else {
        lockBoard = true;
        setTimeout(() => {
          cards[first].flipped = false;
          cards[second].flipped = false;
          flippedIndices = [];
          lockBoard = false;
          render();
        }, 1000);
      }
    }

    initGame();
  </script>
</body>
</html>
